<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رفيق المسلم</title>
    <!-- استدعاء مكتبة بوتستراب للتصميم -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card { border-radius: 15px; }
        .navbar { box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark bg-success text-white text-center">
        <div class="container">
            <span class="navbar-brand mx-auto">تطبيق رفيق المسلم</span>
        </div>
    </nav>

    <div class="container mt-4 text-center">
        <div class="row">
            <!-- مربع مواقيت الصلاة -->
            <div class="col-md-4 mb-3">
                <div class="card p-3 shadow-sm border-0">
                    <h5>مواقيت الصلاة</h5>
                    <div id="prayer-times" class="mt-2">جاري تحميل المواقيت...</div>
                </div>
            </div>
            
            <!-- مربع القبلة -->
            <div class="col-md-4 mb-3">
                <div class="card p-3 shadow-sm border-0">
                    <h5>اتجاه القبلة</h5>
                    <p class="mt-2">اضغط هنا لتحديد القبلة</p>
                </div>
            </div>
            
            <!-- مربع الأذكار -->
            <div class="col-md-4 mb-3">
                <div class="card p-3 shadow-sm border-0">
                    <h5>أذكار اليوم</h5>
                    <p class="mt-2">قائمة الأذكار</p>
                </div>
            </div>
        </div>
    </div>

    <!-- كود جلب مواقيت الصلاة -->
    <script>
        async function getPrayerTimes() {
            try {
                // جلب المواقيت للقاهرة من API موثوق
                const response = await fetch('https://api.aladhan.com/v1/timingsByCity?city=Cairo&country=Egypt&method=5');
                const data = await response.json();
                const timings = data.data.timings;
                
                // تحديث المربع في الصفحة
                document.getElementById('prayer-times').innerHTML = `
                    <div style="font-size: 1.1rem; line-height: 2;">
                        الفجر: <b>${timings.Fajr}</b><br>
                        الظهر: <b>${timings.Dhuhr}</b><br>
                        العصر: <b>${timings.Asr}</b><br>
                        المغرب: <b>${timings.Maghrib}</b><br>
                        العشاء: <b>${timings.Isha}</b>
                    </div>
                `;
            } catch (error) {
                document.getElementById('prayer-times').innerText = "تعذر تحميل المواقيت، تأكد من الاتصال بالإنترنت.";
            }
        }
        
        // تشغيل الوظيفة عند تحميل الصفحة
        getPrayerTimes();
    </script>

</body>
</html>
