<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رفيق المسلم</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', sans-serif; }
        .card { border-radius: 15px; cursor: pointer; transition: 0.3s; }
        .card:hover { transform: scale(1.02); }
        .navbar { box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark bg-success text-white text-center">
        <div class="container">
            <span class="navbar-brand mx-auto">تطبيق رفيق المسلم</span>
        </div>
    </nav>

    <div class="container mt-4 text-center">
        <div class="row">
            <div class="col-md-4 mb-3">
                <div class="card p-3 shadow-sm border-0"><h5>مواقيت الصلاة</h5>
                    <div id="prayer-times" class="mt-2">جاري تحميل المواقيت...</div>
                </div>
            </div>
            <div class="col-md-4 mb-3">
                <div class="card p-3 shadow-sm border-0"><h5>اتجاه القبلة</h5><p class="mt-2">قريباً...</p></div>
            </div>
            <div class="col-md-4 mb-3">
                <div class="card p-3 shadow-sm border-0" onclick="showAzkar()">
                    <h5>أذكار اليوم</h5>
                    <p class="mt-2">اضغط لعرض/إخفاء الأذكار</p>
                </div>
            </div>
        </div>
    </div>

    <div id="azkar-box" class="container mt-4 d-none">
        <div class="card p-4 shadow-sm border-0">
            <h5>أذكار المسلم</h5>
            <div id="azkar-content" class="text-end mt-3">
                <p>• سبحان الله وبحمده</p>
                <p>• أستغفر الله العظيم</p>
                <p>• لا إله إلا الله وحده لا شريك له</p>
            </div>
        </div>
    </div>

    <script>
        function showAzkar() {
            const azkarBox = document.getElementById('azkar-box');
            // التبديل بين الظهور والاختفاء
            if (azkarBox.classList.contains('d-none')) {
                azkarBox.classList.remove('d-none');
            } else {
                azkarBox.classList.add('d-none');
            }
        }

        function formatTime(timeString) {
            let [hours, minutes] = timeString.split(':').map(Number);
            let ampm = hours >= 12 ? 'م' : 'ص';
            hours = hours % 12 || 12;
            return `${hours}:${minutes < 10 ? '0'+minutes : minutes} ${ampm}`;
        }

        async function getPrayerTimes() {
            try {
                const response = await fetch('https://api.aladhan.com/v1/timingsByCity?city=Cairo&country=Egypt&method=5');
                const data = await response.json();
                const timings = data.data.timings;
                document.getElementById('prayer-times').innerHTML = `
                    <div style="font-size: 1.1rem; line-height: 2;">
                        الفجر: <b>${formatTime(timings.Fajr)}</b><br>
                        الظهر: <b>${formatTime(timings.Dhuhr)}</b><br>
                        العصر: <b>${formatTime(timings.Asr)}</b><br>
                        المغرب: <b>${formatTime(timings.Maghrib)}</b><br>
                        العشاء: <b>${formatTime(timings.Isha)}</b>
                    </div>
                `;
            } catch (e) { document.getElementById('prayer-times').innerText = "حدث خطأ"; }
        }
        
        getPrayerTimes();
    </script>
</body>
</html>
